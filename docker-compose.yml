services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "${SA_PASSWORD:?SA_PASSWORD is required}"
    ports:
      - "1433:1433"
    volumes:
      - sqlserver-data:/var/opt/mssql
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P \"$$MSSQL_SA_PASSWORD\" -Q 'SELECT 1' -No"]
      interval: 10s
      timeout: 5s
      retries: 10

  callcadence-api:
    build:
      context: .
      dockerfile: src/CallCadence.API/Dockerfile
    ports:
      - "5108:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__CallCadenceDb: "${CALLCADENCE_DB_CONNECTION:?CALLCADENCE_DB_CONNECTION is required}"
      ConnectionStrings__CallCadenceHangfireDb: "${CALLCADENCE_HANGFIRE_DB_CONNECTION:?CALLCADENCE_HANGFIRE_DB_CONNECTION is required}"
      Sentry__Dsn: "${SENTRY_DSN:-}"
    depends_on:
      sqlserver:
        condition: service_healthy

  callcadence-ui:
    build:
      context: .
      dockerfile: src/CallCadence.UI/Dockerfile
    ports:
      - "5234:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      Api__BaseUrl: "http://callcadence-api:8080"
    depends_on:
      - callcadence-api

volumes:
  sqlserver-data:
